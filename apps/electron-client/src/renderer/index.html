<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>客户信息登记表</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
        background: #f0f2f5;
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 20px;
      }
      .container {
        background: white; border-radius: 12px; padding: 40px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        max-width: 680px; width: 100%;
      }
      h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 8px; text-align: center; }
      .subtitle { font-size: 13px; color: #999; text-align: center; margin-bottom: 32px; }
      .form-group { margin-bottom: 20px; }
      label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 6px; }
      label .required { color: #e74c3c; margin-left: 4px; }
      input[type="text"], input[type="tel"], input[type="email"], input[type="date"], input[type="password"],
      textarea, select {
        width: 100%; padding: 10px 12px;
        border: 1px solid #d9d9d9; border-radius: 6px;
        font-size: 14px; color: #333;
        transition: border-color 0.2s, box-shadow 0.2s;
        background: #fff;
      }
      input:focus, textarea:focus, select:focus {
        border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.15);
        outline: none;
      }
      textarea { resize: vertical; min-height: 80px; }
      .radio-group, .checkbox-group { display: flex; gap: 20px; flex-wrap: wrap; }
      .radio-group label, .checkbox-group label {
        display: flex; align-items: center; gap: 6px;
        font-weight: 400; cursor: pointer; font-size: 14px;
      }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
      .btn-row { display: flex; gap: 12px; margin-top: 32px; justify-content: center; }
      .btn { padding: 10px 32px; border-radius: 6px; font-size: 15px; cursor: pointer; border: none; transition: all 0.2s; }
      .btn-primary { background: #1890ff; color: white; }
      .btn-primary:hover { background: #40a9ff; }
      .btn-default { background: #fff; color: #333; border: 1px solid #d9d9d9; }
      .btn-default:hover { border-color: #1890ff; color: #1890ff; }
      .btn-danger { background: #fff; color: #e74c3c; border: 1px solid #e74c3c; }
      .btn-danger:hover { background: #fff1f0; }
      .btn-success { background: #52c41a; color: white; }
      .btn-success:hover { background: #73d13d; }

      .status-bar {
        margin-top: 20px; padding: 10px 16px;
        background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 6px;
        font-size: 12px; color: #52c41a; display: flex; align-items: center; gap: 8px;
      }
      .status-bar.error {
        background: #fff2f0; border-color: #ffccc7; color: #e74c3c;
      }
      .dot { width: 8px; height: 8px; background: #52c41a; border-radius: 50%; animation: pulse 2s infinite; }
      .status-bar.error .dot { background: #e74c3c; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      .toast {
        position: fixed; top: 20px; right: 20px;
        padding: 12px 24px; border-radius: 8px; color: white; font-size: 14px;
        z-index: 9999; transition: all 0.3s; opacity: 0; transform: translateY(-20px);
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .toast.success { background: #52c41a; }
      .toast.error { background: #e74c3c; }
      .toast.info { background: #1890ff; }

      /* 设置面板 */
      .settings-toggle {
        text-align: center; margin-bottom: 16px;
      }
      .settings-toggle a {
        color: #999; font-size: 12px; text-decoration: none;
        cursor: pointer;
      }
      .settings-toggle a:hover { color: #1890ff; }
      .settings-panel {
        display: none; background: #fafafa; border: 1px solid #e8e8e8;
        border-radius: 8px; padding: 20px; margin-bottom: 24px;
      }
      .settings-panel.visible { display: block; }
      .settings-panel h3 { font-size: 14px; color: #333; margin-bottom: 16px; }
      .settings-panel .hint {
        font-size: 11px; color: #999; margin-top: 4px;
      }
      .settings-row { display: flex; gap: 8px; margin-top: 12px; }
      .settings-row .btn { font-size: 13px; padding: 8px 20px; }

      /* 命令日志 */
      .cmd-log-section {
        margin-top: 16px; border: 1px solid #e8e8e8; border-radius: 6px; overflow: hidden;
      }
      .cmd-log-header {
        background: #fafafa; padding: 8px 12px; cursor: pointer;
        display: flex; justify-content: space-between; align-items: center;
        font-size: 12px; color: #666; user-select: none;
      }
      .cmd-log-header:hover { background: #f0f0f0; }
      .cmd-log-body {
        max-height: 150px; overflow-y: auto; background: #1e1e1e;
        padding: 8px; font-family: 'Cascadia Code', 'Fira Code', monospace;
        font-size: 11px; display: none;
      }
      .cmd-log-body.visible { display: block; }
      .cmd-log-line {
        padding: 2px 4px; color: #d4d4d4; border-bottom: 1px solid #2d2d2d;
      }
      .cmd-log-line .ts { color: #6a9955; }
      .cmd-log-line .type { color: #569cd6; }
      .cmd-log-line .rid { color: #808080; }
      .cmd-log-line .detail { color: #ce9178; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>客户信息登记表</h1>
      <p class="subtitle">请完整填写以下信息</p>

      <!-- 设置面板 -->
      <div class="settings-toggle">
        <a onclick="toggleSettings()" id="settingsLink">⚙ 连接设置</a>
      </div>
      <div class="settings-panel" id="settingsPanel">
        <h3>连接设置</h3>
        <div class="form-group">
          <label>中继服务器地址</label>
          <input type="text" id="cfgServerUrl" placeholder="ws://localhost:9300/ws" />
          <p class="hint">WebSocket 地址，默认为 ws://localhost:9300/ws</p>
        </div>
        <div class="form-group">
          <label>Agent Token</label>
          <input type="password" id="cfgToken" placeholder="由中继服务器生成" />
          <p class="hint">与中继服务器的 AGENT_TOKEN 一致</p>
        </div>
        <div class="form-group">
          <label>H5 页面地址（可选）</label>
          <input type="text" id="cfgH5Url" placeholder="留空则加载本地表单" />
          <p class="hint">远程 H5 页面 URL，例如 https://example.com/form</p>
        </div>
        <div class="settings-row">
          <button class="btn btn-primary" onclick="saveAndReconnect()">保存并重连</button>
          <button class="btn btn-default" onclick="toggleSettings()">取消</button>
        </div>
      </div>

      <!-- 基本信息 -->
      <div class="row">
        <div class="form-group">
          <label>姓名<span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="请输入姓名" />
        </div>
        <div class="form-group">
          <label>手机号<span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" placeholder="请输入手机号" />
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="email" name="email" placeholder="请输入邮箱" />
        </div>
        <div class="form-group">
          <label>身份证号</label>
          <input type="text" id="idCard" name="idCard" placeholder="请输入身份证号" maxlength="18" />
        </div>
      </div>

      <!-- 性别和出生日期 -->
      <div class="row">
        <div class="form-group">
          <label>性别<span class="required">*</span></label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="male" /> 男</label>
            <label><input type="radio" name="gender" value="female" /> 女</label>
          </div>
        </div>
        <div class="form-group">
          <label>出生日期</label>
          <input type="date" id="birthday" name="birthday" />
        </div>
      </div>

      <!-- 学历和职业 -->
      <div class="row">
        <div class="form-group">
          <label>学历<span class="required">*</span></label>
          <select id="education" name="education">
            <option value="">请选择学历</option>
            <option value="highschool">高中及以下</option>
            <option value="college">大专</option>
            <option value="bachelor">本科</option>
            <option value="master">硕士</option>
            <option value="doctor">博士</option>
          </select>
        </div>
        <div class="form-group">
          <label>职业</label>
          <select id="occupation" name="occupation">
            <option value="">请选择职业</option>
            <option value="employee">企业职员</option>
            <option value="civilServant">公务员</option>
            <option value="selfEmployed">个体经营</option>
            <option value="freelancer">自由职业</option>
            <option value="student">学生</option>
            <option value="other">其他</option>
          </select>
        </div>
      </div>

      <!-- 月收入 -->
      <div class="form-group">
        <label>月收入范围<span class="required">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="income" value="0-5000" /> 5000以下</label>
          <label><input type="radio" name="income" value="5000-10000" /> 5000-10000</label>
          <label><input type="radio" name="income" value="10000-20000" /> 10000-20000</label>
          <label><input type="radio" name="income" value="20000+" /> 20000以上</label>
        </div>
      </div>

      <!-- 地址 -->
      <div class="row-3">
        <div class="form-group">
          <label>省份</label>
          <select id="province" name="province">
            <option value="">请选择</option>
            <option value="beijing">北京市</option>
            <option value="shanghai">上海市</option>
            <option value="guangdong">广东省</option>
            <option value="zhejiang">浙江省</option>
            <option value="jiangsu">江苏省</option>
          </select>
        </div>
        <div class="form-group">
          <label>城市</label>
          <select id="city" name="city">
            <option value="">请选择</option>
            <option value="shenzhen">深圳市</option>
            <option value="guangzhou">广州市</option>
            <option value="hangzhou">杭州市</option>
            <option value="nanjing">南京市</option>
          </select>
        </div>
        <div class="form-group">
          <label>区/县</label>
          <select id="district" name="district">
            <option value="">请选择</option>
            <option value="nanshan">南山区</option>
            <option value="futian">福田区</option>
            <option value="xihu">西湖区</option>
            <option value="gulou">鼓楼区</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>详细地址</label>
        <input type="text" id="address" name="address" placeholder="请输入详细地址" />
      </div>

      <!-- 备注 -->
      <div class="form-group">
        <label>备注</label>
        <textarea id="remark" name="remark" placeholder="请输入备注信息（选填）"></textarea>
      </div>

      <!-- 协议 -->
      <div class="form-group">
        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="agreement" name="agreement" />
            我已阅读并同意《服务协议》和《隐私政策》
          </label>
        </div>
      </div>

      <!-- 按钮 -->
      <div class="btn-row">
        <button class="btn btn-primary" id="submitBtn" onclick="submitForm()">提交</button>
        <button class="btn btn-default" id="resetBtn" onclick="resetForm()">重置</button>
        <button class="btn btn-danger" id="clearBtn" onclick="clearForm()">清空</button>
      </div>

      <!-- 状态栏 -->
      <div class="status-bar" id="statusBar">
        <span class="dot"></span>
        未连接 — 请先配置连接设置
      </div>

      <!-- 命令日志 -->
      <div class="cmd-log-section" id="cmdLogSection" style="display:none">
        <div class="cmd-log-header" onclick="toggleCmdLog()">
          <span id="cmdLogTitle">📋 命令日志 (0)</span>
          <button class="btn btn-default" style="font-size:11px;padding:2px 8px" onclick="event.stopPropagation();clearCmdLogs()">清空</button>
        </div>
        <div class="cmd-log-body" id="cmdLogBody"></div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
      // ===== Toast =====
      function showToast(msg, type) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast ' + type + ' show';
        setTimeout(function() { t.className = 'toast'; }, 3000);
      }

      // ===== 设置面板 =====
      var settingsVisible = false;
      function toggleSettings() {
        settingsVisible = !settingsVisible;
        var panel = document.getElementById('settingsPanel');
        var link = document.getElementById('settingsLink');
        if (settingsVisible) {
          panel.className = 'settings-panel visible';
          link.textContent = '⚙ 收起设置';
          loadConfigToForm();
        } else {
          panel.className = 'settings-panel';
          link.textContent = '⚙ 连接设置';
        }
      }

      function loadConfigToForm() {
        if (!window.electronAgent) return;
        window.electronAgent.getConfig().then(function(cfg) {
          document.getElementById('cfgServerUrl').value = cfg.serverUrl || '';
          document.getElementById('cfgToken').value = cfg.agentToken || '';
          document.getElementById('cfgH5Url').value = cfg.h5Url || '';
        });
      }

      function saveAndReconnect() {
        var cfg = {
          serverUrl: document.getElementById('cfgServerUrl').value.trim(),
          agentToken: document.getElementById('cfgToken').value.trim(),
          h5Url: document.getElementById('cfgH5Url').value.trim(),
        };

        if (!cfg.serverUrl) {
          showToast('请填写中继服务器地址', 'error');
          return;
        }
        if (!cfg.agentToken) {
          showToast('请填写 Agent Token', 'error');
          return;
        }

        if (!window.electronAgent) {
          showToast('仅 Electron 客户端支持配置', 'error');
          return;
        }

        window.electronAgent.saveConfig(cfg).then(function(result) {
          if (result.ok) {
            showToast('配置已保存，正在重连...', 'success');
            toggleSettings();
            // 更新状态栏为"重连中"
            updateStatus('connecting', '正在重连...');
            window.electronAgent.reconnect().then(function() {
              showToast('已重连', 'info');
            });
          } else {
            showToast('保存失败', 'error');
          }
        }).catch(function(e) {
          showToast('保存失败: ' + e.message, 'error');
        });
      }

      // ===== 状态栏 =====
      function updateStatus(state, msg) {
        var bar = document.getElementById('statusBar');
        if (state === 'connected') {
          bar.innerHTML = '<span class="dot"></span> ' + msg;
          bar.className = 'status-bar';
        } else if (state === 'error') {
          bar.innerHTML = '<span class="dot"></span> ' + msg;
          bar.className = 'status-bar error';
        } else {
          bar.innerHTML = '<span class="dot"></span> ' + msg;
          bar.className = 'status-bar';
        }
      }

      // ===== Form actions =====
      function submitForm() {
        var name = document.getElementById('name').value.trim();
        var phone = document.getElementById('phone').value.trim();
        if (!name || !phone) {
          showToast('请填写姓名和手机号', 'error');
          return;
        }
        if (!document.getElementById('agreement').checked) {
          showToast('请阅读并同意服务协议', 'error');
          return;
        }
        showToast('提交成功！', 'success');
        console.log('[FORM SUBMIT]', {
          name: name,
          phone: phone,
          email: document.getElementById('email').value,
          idCard: document.getElementById('idCard').value,
          gender: document.querySelector('input[name="gender"]:checked')?.value,
          birthday: document.getElementById('birthday').value,
          education: document.getElementById('education').value,
          occupation: document.getElementById('occupation').value,
          income: document.querySelector('input[name="income"]:checked')?.value,
          province: document.getElementById('province').value,
          city: document.getElementById('city').value,
          district: document.getElementById('district').value,
          address: document.getElementById('address').value,
          remark: document.getElementById('remark').value,
        });
      }

      function resetForm() {
        document.querySelectorAll('input, select, textarea').forEach(function(el) {
          if (el.type === 'radio' || el.type === 'checkbox') {
            el.checked = false;
          } else {
            el.value = '';
          }
        });
        showToast('表单已重置', 'info');
      }

      function clearForm() {
        resetForm();
        showToast('表单已清空', 'info');
      }

      // ===== Remote control API (for CDP eval) =====
      window.__agentSetField = function(name, value) {
        var el = document.querySelector('[name="' + name + '"]') || document.getElementById(name);
        if (!el) return { ok: false, error: 'Field not found: ' + name };

        if (el.type === 'radio') {
          var radio = document.querySelector('[name="' + name + '"][value="' + value + '"]');
          if (radio) { radio.checked = true; el = radio; }
          else return { ok: false, error: 'Radio value not found: ' + value };
        } else if (el.type === 'checkbox') {
          el.checked = value === true || value === 'true';
        } else {
          el.value = value;
        }

        // Trigger events for Vue/React compatibility
        el.dispatchEvent(new Event('input', { bubbles: true }));
        el.dispatchEvent(new Event('change', { bubbles: true }));
        return { ok: true, field: name, value: value };
      };

      window.__agentFillForm = function(fields) {
        var results = [];
        for (var name in fields) {
          if (fields.hasOwnProperty(name)) {
            results.push(window.__agentSetField(name, fields[name]));
          }
        }
        return { ok: true, filled: results.length, results: results };
      };

      window.__agentGetFields = function() {
        var fields = [];
        document.querySelectorAll('input, select, textarea').forEach(function(el) {
          if (el.name || el.id) {
            var value = '';
            if (el.type === 'radio' || el.type === 'checkbox') {
              value = el.checked;
            } else {
              value = el.value;
            }
            fields.push({
              name: el.name || el.id,
              id: el.id,
              type: el.type || el.tagName.toLowerCase(),
              value: value,
              placeholder: el.placeholder || '',
              required: !!el.required,
            });
          }
        });
        return fields;
      };

      // ===== Agent integration =====
      function initAgentIntegration() {
        if (!window.electronAgent) return;

        // 监听状态
        window.electronAgent.onStatusChange(function(status) {
          if (status.connected) {
            updateStatus('connected', 'Agent 已连接 — ' + (status.serverUrl || ''));
          } else if (status.error) {
            updateStatus('error', '连接失败: ' + status.error);
          } else {
            updateStatus('disconnected', '未连接');
          }
        });

        // 加载当前配置并更新状态
        window.electronAgent.getConfig().then(function(cfg) {
          if (cfg.agentToken) {
            updateStatus('connecting', '连接中...');
          } else {
            updateStatus('disconnected', '未配置 — 点击上方 ⚙ 连接设置');
            // 自动显示空 token 时打开设置
            toggleSettings();
          }
        });

        // 获取设备信息
        window.electronAgent.getDeviceInfo().then(function(info) {
          if (info) {
            updateStatus('connected', 'Agent 在线 — 设备: ' +
              (info.info ? info.info.name || info.deviceId : info.deviceId));
          }
        });

        // 监听命令日志
        var cmdLogCount = 0;
        window.electronAgent.onCommandLog(function(log) {
          cmdLogCount++;
          var section = document.getElementById('cmdLogSection');
          var body = document.getElementById('cmdLogBody');
          var title = document.getElementById('cmdLogTitle');
          section.style.display = 'block';
          title.textContent = '📋 命令日志 (' + cmdLogCount + ')';
          var line = document.createElement('div');
          line.className = 'cmd-log-line';
          line.innerHTML = '<span class="ts">' + log.ts + '</span> ' +
            '<span class="type">' + log.type + '</span> ' +
            '<span class="rid">' + log.requestId + '</span>' +
            '<span class="detail">' + (log.detail || '') + '</span>';
          body.appendChild(line);
          body.scrollTop = body.scrollHeight;
          // Keep max 200 lines
          while (body.children.length > 200) body.removeChild(body.firstChild);
        });
      }

      function toggleCmdLog() {
        var body = document.getElementById('cmdLogBody');
        body.classList.toggle('visible');
      }

      function clearCmdLogs() {
        var body = document.getElementById('cmdLogBody');
        var title = document.getElementById('cmdLogTitle');
        cmdLogCount = 0;
        body.innerHTML = '';
        title.textContent = '📋 命令日志 (0)';
      }
      }

      // 延迟初始化，等 preload 完成
      setTimeout(initAgentIntegration, 200);

      console.log('[FORM PAGE] Ready. __agentSetField / __agentFillForm / __agentGetFields available.');
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>客户信息登记表</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
        background: #f0f2f5;
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 20px;
      }
      .container {
        background: white; border-radius: 12px; padding: 40px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        max-width: 680px; width: 100%;
      }
      h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 8px; text-align: center; }
      .subtitle { font-size: 13px; color: #999; text-align: center; margin-bottom: 32px; }
      .form-group { margin-bottom: 20px; }
      label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 6px; }
      label .required { color: #e74c3c; margin-left: 4px; }
      input[type="text"], input[type="tel"], input[type="email"], input[type="date"],
      textarea, select {
        width: 100%; padding: 10px 12px;
        border: 1px solid #d9d9d9; border-radius: 6px;
        font-size: 14px; color: #333;
        transition: border-color 0.2s, box-shadow 0.2s;
        background: #fff;
      }
      input:focus, textarea:focus, select:focus {
        border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.15);
        outline: none;
      }
      textarea { resize: vertical; min-height: 80px; }
      .radio-group, .checkbox-group { display: flex; gap: 20px; flex-wrap: wrap; }
      .radio-group label, .checkbox-group label {
        display: flex; align-items: center; gap: 6px;
        font-weight: 400; cursor: pointer; font-size: 14px;
      }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
      .btn-row { display: flex; gap: 12px; margin-top: 32px; justify-content: center; }
      .btn { padding: 10px 32px; border-radius: 6px; font-size: 15px; cursor: pointer; border: none; transition: all 0.2s; }
      .btn-primary { background: #1890ff; color: white; }
      .btn-primary:hover { background: #40a9ff; }
      .btn-default { background: #fff; color: #333; border: 1px solid #d9d9d9; }
      .btn-default:hover { border-color: #1890ff; color: #1890ff; }
      .btn-danger { background: #fff; color: #e74c3c; border: 1px solid #e74c3c; }
      .btn-danger:hover { background: #fff1f0; }
      .status-bar {
        margin-top: 20px; padding: 10px 16px;
        background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 6px;
        font-size: 12px; color: #52c41a; display: flex; align-items: center; gap: 8px;
      }
      .dot { width: 8px; height: 8px; background: #52c41a; border-radius: 50%; animation: pulse 2s infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      .toast {
        position: fixed; top: 20px; right: 20px;
        padding: 12px 24px; border-radius: 8px; color: white; font-size: 14px;
        z-index: 9999; transition: all 0.3s; opacity: 0; transform: translateY(-20px);
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .toast.success { background: #52c41a; }
      .toast.error { background: #e74c3c; }
      .toast.info { background: #1890ff; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>客户信息登记表</h1>
      <p class="subtitle">请完整填写以下信息</p>

      <!-- 基本信息 -->
      <div class="row">
        <div class="form-group">
          <label>姓名<span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="请输入姓名" />
        </div>
        <div class="form-group">
          <label>手机号<span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" placeholder="请输入手机号" />
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="email" name="email" placeholder="请输入邮箱" />
        </div>
        <div class="form-group">
          <label>身份证号</label>
          <input type="text" id="idCard" name="idCard" placeholder="请输入身份证号" maxlength="18" />
        </div>
      </div>

      <!-- 性别和出生日期 -->
      <div class="row">
        <div class="form-group">
          <label>性别<span class="required">*</span></label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="male" /> 男</label>
            <label><input type="radio" name="gender" value="female" /> 女</label>
          </div>
        </div>
        <div class="form-group">
          <label>出生日期</label>
          <input type="date" id="birthday" name="birthday" />
        </div>
      </div>

      <!-- 学历和职业 -->
      <div class="row">
        <div class="form-group">
          <label>学历<span class="required">*</span></label>
          <select id="education" name="education">
            <option value="">请选择学历</option>
            <option value="highschool">高中及以下</option>
            <option value="college">大专</option>
            <option value="bachelor">本科</option>
            <option value="master">硕士</option>
            <option value="doctor">博士</option>
          </select>
        </div>
        <div class="form-group">
          <label>职业</label>
          <select id="occupation" name="occupation">
            <option value="">请选择职业</option>
            <option value="employee">企业职员</option>
            <option value="civilServant">公务员</option>
            <option value="selfEmployed">个体经营</option>
            <option value="freelancer">自由职业</option>
            <option value="student">学生</option>
            <option value="other">其他</option>
          </select>
        </div>
      </div>

      <!-- 月收入 -->
      <div class="form-group">
        <label>月收入范围<span class="required">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="income" value="0-5000" /> 5000以下</label>
          <label><input type="radio" name="income" value="5000-10000" /> 5000-10000</label>
          <label><input type="radio" name="income" value="10000-20000" /> 10000-20000</label>
          <label><input type="radio" name="income" value="20000+" /> 20000以上</label>
        </div>
      </div>

      <!-- 地址 -->
      <div class="row-3">
        <div class="form-group">
          <label>省份</label>
          <select id="province" name="province">
            <option value="">请选择</option>
            <option value="beijing">北京市</option>
            <option value="shanghai">上海市</option>
            <option value="guangdong">广东省</option>
            <option value="zhejiang">浙江省</option>
            <option value="jiangsu">江苏省</option>
          </select>
        </div>
        <div class="form-group">
          <label>城市</label>
          <select id="city" name="city">
            <option value="">请选择</option>
            <option value="shenzhen">深圳市</option>
            <option value="guangzhou">广州市</option>
            <option value="hangzhou">杭州市</option>
            <option value="nanjing">南京市</option>
          </select>
        </div>
        <div class="form-group">
          <label>区/县</label>
          <select id="district" name="district">
            <option value="">请选择</option>
            <option value="nanshan">南山区</option>
            <option value="futian">福田区</option>
            <option value="xihu">西湖区</option>
            <option value="gulou">鼓楼区</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>详细地址</label>
        <input type="text" id="address" name="address" placeholder="请输入详细地址" />
      </div>

      <!-- 备注 -->
      <div class="form-group">
        <label>备注</label>
        <textarea id="remark" name="remark" placeholder="请输入备注信息（选填）"></textarea>
      </div>

      <!-- 协议 -->
      <div class="form-group">
        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="agreement" name="agreement" />
            我已阅读并同意《服务协议》和《隐私政策》
          </label>
        </div>
      </div>

      <!-- 按钮 -->
      <div class="btn-row">
        <button class="btn btn-primary" id="submitBtn" onclick="submitForm()">提交</button>
        <button class="btn btn-default" id="resetBtn" onclick="resetForm()">重置</button>
        <button class="btn btn-danger" id="clearBtn" onclick="clearForm()">清空</button>
      </div>

      <!-- 状态栏 -->
      <div class="status-bar" id="statusBar">
        <span class="dot"></span>
        Agent 已连接 — 中继服务器 ws://localhost:9300
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
      // ===== Toast =====
      function showToast(msg, type) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast ' + type + ' show';
        setTimeout(function() { t.className = 'toast'; }, 2000);
      }

      // ===== Form actions =====
      function submitForm() {
        var name = document.getElementById('name').value.trim();
        var phone = document.getElementById('phone').value.trim();
        if (!name || !phone) {
          showToast('请填写姓名和手机号', 'error');
          return;
        }
        if (!document.getElementById('agreement').checked) {
          showToast('请阅读并同意服务协议', 'error');
          return;
        }
        showToast('提交成功！', 'success');
        console.log('[FORM SUBMIT]', {
          name: name,
          phone: phone,
          email: document.getElementById('email').value,
          idCard: document.getElementById('idCard').value,
          gender: document.querySelector('input[name="gender"]:checked')?.value,
          birthday: document.getElementById('birthday').value,
          education: document.getElementById('education').value,
          occupation: document.getElementById('occupation').value,
          income: document.querySelector('input[name="income"]:checked')?.value,
          province: document.getElementById('province').value,
          city: document.getElementById('city').value,
          district: document.getElementById('district').value,
          address: document.getElementById('address').value,
          remark: document.getElementById('remark').value,
        });
      }

      function resetForm() {
        document.querySelectorAll('input, select, textarea').forEach(function(el) {
          if (el.type === 'radio' || el.type === 'checkbox') {
            el.checked = false;
          } else {
            el.value = '';
          }
        });
        showToast('表单已重置', 'info');
      }

      function clearForm() {
        resetForm();
        showToast('表单已清空', 'info');
      }

      // ===== Remote control API (for CDP eval) =====
      window.__agentSetField = function(name, value) {
        var el = document.querySelector('[name="' + name + '"]') || document.getElementById(name);
        if (!el) return { ok: false, error: 'Field not found: ' + name };

        if (el.type === 'radio') {
          var radio = document.querySelector('[name="' + name + '"][value="' + value + '"]');
          if (radio) { radio.checked = true; el = radio; }
          else return { ok: false, error: 'Radio value not found: ' + value };
        } else if (el.type === 'checkbox') {
          el.checked = value === true || value === 'true';
        } else {
          el.value = value;
        }

        // Trigger events for Vue/React compatibility
        el.dispatchEvent(new Event('input', { bubbles: true }));
        el.dispatchEvent(new Event('change', { bubbles: true }));
        return { ok: true, field: name, value: value };
      };

      window.__agentFillForm = function(fields) {
        var results = [];
        for (var name in fields) {
          if (fields.hasOwnProperty(name)) {
            results.push(window.__agentSetField(name, fields[name]));
          }
        }
        return { ok: true, filled: results.length, results: results };
      };

      window.__agentGetFields = function() {
        var fields = [];
        document.querySelectorAll('input, select, textarea').forEach(function(el) {
          if (el.name || el.id) {
            var value = '';
            if (el.type === 'radio' || el.type === 'checkbox') {
              value = el.checked;
            } else {
              value = el.value;
            }
            fields.push({
              name: el.name || el.id,
              id: el.id,
              type: el.type || el.tagName.toLowerCase(),
              value: value,
              placeholder: el.placeholder || '',
              required: !!el.required,
            });
          }
        });
        return fields;
      };

      // ===== Agent integration =====
      try {
        if (window.electronAgent) {
          window.electronAgent.getDeviceInfo().then(function(info) {
            document.getElementById('statusBar').innerHTML =
              '<span class="dot"></span> Agent 在线 — 设备: ' +
              (info.name || info.deviceId) + ' (' + info.os + ')';
          });
        }
      } catch(e) {
        // Not running in Electron
      }

      console.log('[FORM PAGE] Ready. __agentSetField / __agentFillForm / __agentGetFields available.');
    </script>
  </body>
</html>

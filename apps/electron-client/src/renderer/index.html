<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electron Agent Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        text-align: center;
      }

      h1 {
        font-size: 32px;
        color: #333;
        margin-bottom: 16px;
      }

      p {
        font-size: 16px;
        color: #666;
        margin-bottom: 24px;
        line-height: 1.6;
      }

      .status {
        display: inline-block;
        padding: 8px 16px;
        background: #e8f5e9;
        color: #2e7d32;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 24px;
      }

      .info {
        text-align: left;
        background: #f5f5f5;
        padding: 16px;
        border-radius: 8px;
        margin-top: 24px;
      }

      .info-item {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #e0e0e0;
      }

      .info-item:last-child {
        border-bottom: none;
      }

      .info-label {
        font-weight: 500;
        color: #555;
      }

      .info-value {
        color: #777;
        font-family: monospace;
      }

      button {
        background: #667eea;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        margin: 8px;
        transition: background 0.3s;
      }

      button:hover {
        background: #5568d3;
      }

      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Electron Agent Demo</h1>
      <p>
        这是一个示例 Electron 应用，内嵌了 Agent 模块，可以被 Web 管理端远程监控和操作。
      </p>

      <div class="status">
        Agent 已启动，连接到中继服务器 ws://localhost:9300
      </div>

      <div>
        <button onclick="navigateTo('https://www.baidu.com')">
          打开百度
        </button>
        <button onclick="navigateTo('https://github.com')">
          打开 GitHub
        </button>
        <button onclick="runTest()">
          运行测试
        </button>
      </div>

      <div class="info">
        <div class="info-item">
          <span class="info-label">平台:</span>
          <span class="info-value" id="platform">Loading...</span>
        </div>
        <div class="info-item">
          <span class="info-label">Electron 版本:</span>
          <span class="info-value" id="electron-version">Loading...</span>
        </div>
        <div class="info-item">
          <span class="info-label">Node 版本:</span>
          <span class="info-value" id="node-version">Loading...</span>
        </div>
      </div>

      <p style="margin-top: 24px; font-size: 14px; color: #999;">
        提示：此窗口的所有操作（点击、导航、JS 执行）都会被实时监控并上报到管理端
      </p>
    </div>

    <script>
      document.getElementById('platform').textContent = process.platform;
      document.getElementById('electron-version').textContent = process.versions.electron;
      document.getElementById('node-version').textContent = process.versions.node;

      function navigateTo(url) {
        window.location.href = url;
      }

      function runTest() {
        console.log('Test log from renderer process');
        console.warn('Test warning');
        console.error('Test error');

        // 模拟一些网络请求
        fetch('https://api.github.com')
          .then(res => res.json())
          .then(data => console.log('API response:', data))
          .catch(err => console.error('API error:', err));
      }
    </script>
  </body>
</html>

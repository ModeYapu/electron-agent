version: '3.8'

services:
  relay-server:
    build:
      context: .
      dockerfile: apps/relay-server/Dockerfile
    container_name: electron-agent-relay-server
    restart: unless-stopped
    ports:
      - "9300:9300"
    environment:
      - PORT=9300
      - JWT_SECRET=${JWT_SECRET:-your-production-jwt-secret-change-me}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - AGENT_TOKEN=${AGENT_TOKEN:-dev-agent-token-123}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-dev-admin-token-456}
    networks:
      - electron-agent-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9300/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    volumes:
      - relay-logs:/app/logs

  web-console:
    build:
      context: .
      dockerfile: apps/web-console/Dockerfile
    container_name: electron-agent-web-console
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      relay-server:
        condition: service_healthy
    networks:
      - electron-agent-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  electron-agent-network:
    driver: bridge

volumes:
  relay-logs: